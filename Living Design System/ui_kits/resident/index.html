<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Living — Resident App</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: radial-gradient(circle at 50% 30%, var(--stone-100), var(--stone-200)); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "appearance": "light",
    "theme": "coast",
    "backdrop": "#F3EFE8"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    React.useEffect(() => {
      const light = 'color-mix(in oklab, ' + t.backdrop + ' 84%, #ffffff)';
      document.body.style.background =
        'radial-gradient(circle at 50% 28%, ' + light + ', ' + t.backdrop + ')';
    }, [t.backdrop]);
    return (
      <React.Fragment>
        <ResidentApp theme={t.theme} appearance={t.appearance} />
        <TweaksPanel>
          <TweakSection label="Appearance" />
          <TweakRadio label="Theme" value={t.appearance}
            options={["light", "dark"]}
            onChange={(v) => setTweak('appearance', v)} />
          <TweakSection label="Accent tone" />
          <TweakSelect label="App accent" value={t.theme}
            options={["pine", "clay", "ink", "coast"]}
            onChange={(v) => setTweak('theme', v)} />
          <TweakSection label="Backdrop" />
          <TweakColor label="Background" value={t.backdrop}
            options={["#EFEBE4", "#F3EFE8", "#FAF8F4", "#FFFFFF", "#EEF2F0", "#F5F1EB"]}
            onChange={(v) => setTweak('backdrop', v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
