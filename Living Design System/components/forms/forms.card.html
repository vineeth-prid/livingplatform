<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface-page); }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
  .col { display: flex; flex-direction: column; gap: 16px; max-width: 300px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, Select, Checkbox, Switch } = window.LivingDesignSystem_bba765;
  function Demo() {
    return (
      <div>
        <div className="row">
          <Button variant="primary">Book a tour</Button>
          <Button variant="accent" iconRight={<span>→</span>}>Get started</Button>
          <Button variant="secondary">Save</Button>
          <Button variant="outline">Enquire</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="primary" disabled>Disabled</Button>
          <IconButton aria-label="Favourite" variant="soft">♥</IconButton>
          <IconButton aria-label="Share" variant="outline">↗</IconButton>
        </div>
        <div className="grid">
          <div className="col">
            <Input label="Email address" type="email" placeholder="you@living.co" hint="We never share this." />
            <Select label="Community" placeholder="Choose one" options={["Riverside Greens","The Meadows","Highgrove Park"]} />
          </div>
          <div className="col">
            <Input label="Monthly budget" leading="₹" trailing="/mo" placeholder="85,000" />
            <div style={{display:'flex',flexDirection:'column',gap:14,paddingTop:6}}>
              <Checkbox label="Furnished only" defaultChecked />
              <Checkbox label="Pet friendly" description="Cats and dogs welcome" />
              <Switch label="Instant tour alerts" defaultChecked />
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
