<!-- @dsCard group="Spacing" viewport="700x180" name="8-Point Spacing" subtitle="Base unit 8px; generous whitespace is the brand" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:22px 30px;background:var(--surface-page);font-family:var(--font-sans)}.r{display:flex;align-items:center;gap:14px;margin-bottom:9px}.bar{height:16px;background:var(--pine-500);border-radius:3px}.lab{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);width:120px}</style></head><body>
<div class="r"><span class="lab">2 · 8px</span><div class="bar" style="width:8px"></div></div>
<div class="r"><span class="lab">4 · 16px</span><div class="bar" style="width:16px"></div></div>
<div class="r"><span class="lab">5 · 24px</span><div class="bar" style="width:24px"></div></div>
<div class="r"><span class="lab">6 · 32px</span><div class="bar" style="width:32px"></div></div>
<div class="r"><span class="lab">8 · 48px</span><div class="bar" style="width:48px"></div></div>
<div class="r"><span class="lab">9 · 64px</span><div class="bar" style="width:64px"></div></div>
</body></html>
