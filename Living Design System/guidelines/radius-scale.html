<!-- @dsCard group="Spacing" viewport="700x150" name="Border Radius" subtitle="One unified system — soft, never bubbly" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:24px 30px;background:var(--surface-page);font-family:var(--font-sans);display:flex;gap:20px;align-items:flex-end}.item{display:flex;flex-direction:column;gap:8px;align-items:center}.box{width:74px;height:60px;background:var(--surface-card);border:1px solid var(--border-default);box-shadow:var(--shadow-sm)}.lab{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle)}</style></head><body>
<div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 8</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 12</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 16</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl · 22</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lab">2xl · 32</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-pill);width:60px"></div><span class="lab">pill</span></div>
</body></html>
