<!-- @dsCard group="Colors" viewport="700x150" name="Clay — Accent" subtitle="Warmth, life, the human touch — used sparingly" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px 24px;background:var(--surface-page);font-family:var(--font-sans)}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;gap:1px}
  .n{font-size:11px;font-weight:600}
  .h{font-family:var(--font-mono);font-size:10px;opacity:.85}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--clay-50)"><span class="n" style="color:var(--clay-900)">50</span><span class="h" style="color:var(--clay-700)">#FAF0E9</span></div>
  <div class="sw" style="background:var(--clay-100)"><span class="n" style="color:var(--clay-900)">100</span><span class="h" style="color:var(--clay-700)">#F3DDCD</span></div>
  <div class="sw" style="background:var(--clay-300)"><span class="n" style="color:var(--clay-900)">300</span><span class="h" style="color:var(--clay-800)">#D9976D</span></div>
  <div class="sw" style="background:var(--clay-500)"><span class="n" style="color:#fff">500 ●</span><span class="h" style="color:var(--clay-50)">#B96A43</span></div>
  <div class="sw" style="background:var(--clay-600)"><span class="n" style="color:#fff">600</span><span class="h" style="color:var(--clay-100)">#9C5636</span></div>
  <div class="sw" style="background:var(--clay-700)"><span class="n" style="color:#fff">700</span><span class="h" style="color:var(--clay-200)">#7C442C</span></div>
  <div class="sw" style="background:var(--clay-900)"><span class="n" style="color:#fff">900</span><span class="h" style="color:var(--clay-300)">#40241A</span></div>
</div>
</body></html>
