<!-- @dsCard group="Colors" viewport="700x160" name="Surfaces & Text" subtitle="Light and dark theme foundations, side by side" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:18px 22px;background:var(--surface-page);font-family:var(--font-sans);display:flex;gap:16px}
  .pane{flex:1;border-radius:var(--radius-lg);padding:16px;border:1px solid var(--border-subtle)}
  .card{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:12px 14px;box-shadow:var(--shadow-sm);margin-top:10px}
  .t1{color:var(--text-strong);font-weight:600;font-size:15px}
  .t2{color:var(--text-muted);font-size:12.5px;margin-top:2px}
  .t3{color:var(--text-brand);font-size:12px;font-weight:600;margin-top:6px}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle)}
</style></head><body>
<div class="pane" style="background:var(--surface-page)">
  <span class="lbl">Light</span>
  <div class="card"><div class="t1">Life Happens Here.</div><div class="t2">Body text sits calm on warm ivory.</div><div class="t3">Learn more →</div></div>
</div>
<div class="pane" data-theme="dark" style="background:#100E0C">
  <span class="lbl">Dark</span>
  <div class="card"><div class="t1">Life Happens Here.</div><div class="t2">Warm ink, luminous pine accents.</div><div class="t3">Learn more →</div></div>
</div>
</body></html>
