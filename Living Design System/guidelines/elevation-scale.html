<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Soft luxury shadows — warm, low-opacity, layered" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:28px 30px;background:var(--surface-page);font-family:var(--font-sans);display:flex;gap:26px;align-items:center}.item{display:flex;flex-direction:column;gap:12px;align-items:center}.box{width:96px;height:66px;background:var(--surface-card);border-radius:var(--radius-md)}.lab{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle)}</style></head><body>
<div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lab">sm</span></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lab">md</span></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lab">lg</span></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-floating)"></div><span class="lab">floating</span></div>
</body></html>
