<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark" subtitle="No logo supplied — brand renders as a type lockup" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:0;background:var(--surface-page);font-family:var(--font-sans);display:flex;gap:2px}
.pane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;height:180px}
.mark{font-family:var(--font-display);font-weight:500;font-size:2.6rem;letter-spacing:-0.02em}
.dot{color:var(--brand-accent)}
.tag{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase}
</style></head><body>
<div class="pane" style="background:var(--surface-page)">
  <div class="mark" style="color:var(--text-strong)">Living<span class="dot">.</span></div>
  <div class="tag" style="color:var(--text-subtle)">Life Happens Here</div>
</div>
<div class="pane" style="background:var(--pine-700)">
  <div class="mark" style="color:var(--stone-50)">Living<span class="dot">.</span></div>
  <div class="tag" style="color:var(--pine-200)">Life Happens Here</div>
</div>
<div class="pane" style="background:var(--clay-500)">
  <div class="mark" style="color:var(--stone-50)">Living<span style="color:var(--pine-900)">.</span></div>
  <div class="tag" style="color:var(--clay-50)">Life Happens Here</div>
</div>
</body></html>
