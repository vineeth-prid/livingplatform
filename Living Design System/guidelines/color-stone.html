<!-- @dsCard group="Colors" viewport="700x150" name="Stone — Neutral" subtitle="Warm-tinted greys, ivory page to ink text" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px 24px;background:var(--surface-page);font-family:var(--font-sans)}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-subtle)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px;gap:1px}
  .n{font-size:11px;font-weight:600}
  .h{font-family:var(--font-mono);font-size:9.5px;opacity:.85}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--stone-50)"><span class="n" style="color:var(--stone-900)">50</span><span class="h" style="color:var(--stone-600)">#FAF8F4</span></div>
  <div class="sw" style="background:var(--stone-100)"><span class="n" style="color:var(--stone-900)">100</span><span class="h" style="color:var(--stone-600)">#F3EFE8</span></div>
  <div class="sw" style="background:var(--stone-200)"><span class="n" style="color:var(--stone-900)">200</span><span class="h" style="color:var(--stone-600)">#E7E1D5</span></div>
  <div class="sw" style="background:var(--stone-300)"><span class="n" style="color:var(--stone-900)">300</span><span class="h" style="color:var(--stone-700)">#D5CCBC</span></div>
  <div class="sw" style="background:var(--stone-400)"><span class="n" style="color:var(--stone-900)">400</span><span class="h" style="color:var(--stone-800)">#B4A995</span></div>
  <div class="sw" style="background:var(--stone-500)"><span class="n" style="color:#fff">500</span><span class="h" style="color:var(--stone-100)">#8B8171</span></div>
  <div class="sw" style="background:var(--stone-600)"><span class="n" style="color:#fff">600</span><span class="h" style="color:var(--stone-100)">#6A6255</span></div>
  <div class="sw" style="background:var(--stone-700)"><span class="n" style="color:#fff">700</span><span class="h" style="color:var(--stone-200)">#4D473F</span></div>
  <div class="sw" style="background:var(--stone-800)"><span class="n" style="color:#fff">800</span><span class="h" style="color:var(--stone-300)">#322E29</span></div>
  <div class="sw" style="background:var(--stone-950)"><span class="n" style="color:#fff">950</span><span class="h" style="color:var(--stone-400)">#14110F</span></div>
</div>
</body></html>
