<!-- @dsCard group="Colors" viewport="700x150" name="Pine — Primary" subtitle="Trust, growth, home, calm — the brand's core" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px 24px;background:var(--surface-page);font-family:var(--font-sans)}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;gap:1px}
  .n{font-size:11px;font-weight:600;letter-spacing:.02em}
  .h{font-family:var(--font-mono);font-size:10px;opacity:.85}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--pine-50)"><span class="n" style="color:var(--pine-900)">50</span><span class="h" style="color:var(--pine-700)">#EDF3F0</span></div>
  <div class="sw" style="background:var(--pine-100)"><span class="n" style="color:var(--pine-900)">100</span><span class="h" style="color:var(--pine-700)">#D5E3DC</span></div>
  <div class="sw" style="background:var(--pine-300)"><span class="n" style="color:var(--pine-900)">300</span><span class="h" style="color:var(--pine-800)">#7CA695</span></div>
  <div class="sw" style="background:var(--pine-500)"><span class="n" style="color:#fff">500</span><span class="h" style="color:#EDF3F0">#2E5F49</span></div>
  <div class="sw" style="background:var(--pine-600)"><span class="n" style="color:#fff">600 ●</span><span class="h" style="color:#D5E3DC">#234B39</span></div>
  <div class="sw" style="background:var(--pine-700)"><span class="n" style="color:#fff">700</span><span class="h" style="color:#AAC7BA">#1B3B2D</span></div>
  <div class="sw" style="background:var(--pine-900)"><span class="n" style="color:#fff">900</span><span class="h" style="color:#7CA695">#0F211A</span></div>
</div>
</body></html>
