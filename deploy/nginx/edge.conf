# Living edge reverse proxy. TLS terminates at Cloudflare (Full/Strict); this
# origin listens on :80 behind it (or add certs + listen 443 for direct TLS).
# Replace *.living.example with your domains. Routes:
#   admin.*  → portal      app.*   → resident      gate.*  → workforce
#   api.*    → API (Nest)
#
# Rate limiting is a coarse edge backstop; the API's throttler is the real one.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# Shared proxy + security headers.
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_read_timeout 60s;

server_tokens off;

upstream living_api      { server api:4000; }
upstream living_portal   { server portal:8080; }
upstream living_resident { server resident:8080; }
upstream living_workforce{ server workforce:8080; }

# ── API ──
server {
  listen 80;
  server_name api.living.example;
  client_max_body_size 12m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  location /api/v1/health { proxy_pass http://living_api; access_log off; }
  location / {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://living_api;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

# ── Admin portal ──
server { listen 80; server_name admin.living.example;
  location / { proxy_pass http://living_portal; } }

# ── Resident PWA ──
server { listen 80; server_name app.living.example;
  location / { proxy_pass http://living_resident; } }

# ── Workforce PWA ──
server { listen 80; server_name gate.living.example;
  location / { proxy_pass http://living_workforce; } }
