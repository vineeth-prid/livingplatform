# Per-app static SPA server (used inside deploy/Dockerfile.web).
# TLS terminates at the edge (Cloudflare + edge nginx); this listens on :8080.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (edge may add more; these are defence-in-depth).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
  gzip_min_length 1024;

  # Hashed, immutable assets — cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # PWA runtime files must never be cached stale (so updates land immediately).
  location = /sw.js            { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location = /registerSW.js    { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  # SPA fallback — client-side routing.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
