# Living Platform — production stack (Ubuntu 24.04 + Docker Compose).
# TLS terminates at Cloudflare (Full/Strict) in front of the `edge` service.
#
#   cp deploy/.env.production.example .env.production
#   # edit secrets, domains, VITE_API_BASE_URL
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d --build
#
# Frontend API URLs are baked at build time (VITE_API_BASE_URL build-arg).
name: living

x-restart: &restart unless-stopped
x-logging: &logging
  driver: json-file
  options: { max-size: "10m", max-file: "5" }

services:
  postgres:
    image: postgres:16-alpine
    restart: *restart
    logging: *logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1g }
    networks: [living]

  redis:
    image: redis:7-alpine
    restart: *restart
    logging: *logging
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 384m }
    networks: [living]

  # S3-compatible object storage for real file uploads (StorageService s3 driver).
  minio:
    image: minio/minio:latest
    restart: *restart
    logging: *logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      # Console — bound to localhost only; reach it via an SSH tunnel, never public.
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }
    networks: [living]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: *restart
    logging: *logging
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS}
      WEB_APP_URL: ${WEB_APP_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-120}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-living}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      # MinIO / S3 (used when STORAGE_DRIVER=s3). Endpoint is the internal service.
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${STORAGE_BUCKET:-living}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
      SIGNED_URL_EXPIRY: ${SIGNED_URL_EXPIRY:-900}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 768m }
    networks: [living]

  portal:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: portal, VITE_API_BASE_URL: "${VITE_API_BASE_URL}" } }
    restart: *restart
    logging: *logging
    deploy: { resources: { limits: { cpus: "0.5", memory: 128m } } }
    networks: [living]

  resident:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: resident, VITE_API_BASE_URL: "${VITE_API_BASE_URL}" } }
    restart: *restart
    logging: *logging
    deploy: { resources: { limits: { cpus: "0.5", memory: 128m } } }
    networks: [living]

  workforce:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: workforce, VITE_API_BASE_URL: "${VITE_API_BASE_URL}" } }
    restart: *restart
    logging: *logging
    deploy: { resources: { limits: { cpus: "0.5", memory: 128m } } }
    networks: [living]

  edge:
    image: nginx:1.27-alpine
    restart: *restart
    logging: *logging
    volumes:
      - ./deploy/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on: [api, portal, resident, workforce]
    deploy: { resources: { limits: { cpus: "0.5", memory: 128m } } }
    networks: [living]

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  living:
    driver: bridge
